# ------------------------------------------------------------------------
# X Launcher - Official System Configuration Properties
# ------------------------------------------------------------------------

# Enable AndroidX support libraries across the entire application runtime
android.useAndroidX=true

# Automatically convert third-party libraries to use AndroidX dependencies
android.enableJetifier=true

# Optimize Gradle daemon performance limits for high-speed cloud compilation
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true

