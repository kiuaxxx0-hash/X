name: X Launcher Auto-Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile and Assemble APK Payload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Set up JDK 17 Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ADVANCED INTEGRATION: Automatically downloads and installs the missing official gradle environment binaries
      - name: Setup Official Gradle Toolchain Runtime
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2

      - name: Build and Assemble Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload Output APK Artifact Bundle
        uses: actions/upload-artifact@v4
        with:
          name: X-Launcher-Compiled-Build
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
